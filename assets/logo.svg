<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Pulse / ECG line -->
  <polyline
    points="8,48 38,48 48,48 56,28 64,62 72,32 80,52 88,48 118,48"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- NPS -->
  <text x="128" y="50" font-family="'SF Pro Display', 'Inter', 'Segoe UI', -apple-system, sans-serif" font-size="36" font-weight="700" fill="#1E293B" letter-spacing="-1">
    <tspan>NPS</tspan>
  </text>

  <!-- Pulse -->
  <text x="222" y="50" font-family="'SF Pro Display', 'Inter', 'Segoe UI', -apple-system, sans-serif" font-size="36" font-weight="300" fill="#2563EB" letter-spacing="-1">
    <tspan>Pulse</tspan>
  </text>

  <!-- Tagline dot -->
  <circle cx="128" cy="64" r="2" fill="#2563EB" opacity="0.6"/>
  <text x="135" y="68" font-family="'SF Pro Text', 'Inter', 'Segoe UI', -apple-system, sans-serif" font-size="10" font-weight="400" fill="#64748B" letter-spacing="0.5">
    <tspan>Know your customers. Grow your brand.</tspan>
  </text>
</svg>
