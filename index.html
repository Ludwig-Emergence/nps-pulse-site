<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPS Pulse — 客户满意度管理专家</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .logo {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 1.25rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      margin: 2rem auto;
      border-radius: 2px;
    }
    .desc {
      font-size: 1rem;
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }
    .cta {
      display: inline-block;
      padding: 0.875rem 2.5rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(56, 189, 248, 0.3);
    }
    .footer {
      margin-top: 4rem;
      font-size: 0.85rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">NPS Pulse</div>
    <div class="tagline">客户满意度管理专家</div>
    <div class="divider"></div>
    <p class="desc">
      用大公司的 NPS 方法论，<br>
      帮小商家听懂客户声音、提升回头率和口碑。
    </p>
    <a href="#" class="cta">即将上线，敬请期待</a>
    <div class="footer">
      &copy; 2026 NPS Pulse. All rights reserved.
    </div>
  </div>
</body>
</html>
